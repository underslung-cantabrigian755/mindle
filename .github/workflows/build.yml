name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    env:
      # Non-secret mirror so `if:` conditions can gate on signing availability.
      # Empty string when the secret is absent (e.g. fork PRs) — unsigned path runs.
      SIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      # The signed pipeline only runs on tag pushes or a manual dispatch —
      # never on regular main pushes or PRs. Prevents burning notary submissions
      # on every commit and keeps signing material away from PR branches.
      IS_RELEASE_EVENT: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so build.sh's rev-list count is accurate
          fetch-tags: true # ensure local refs/tags/* so `git describe` resolves the tag

      - name: Select Xcode
        # Xcode 26 ships the macOS 26 SDK, which is what lights up
        # Apple's Liquid Glass material on Tahoe machines while still
        # letting us keep a macOS 14 deployment target in build.sh.
        run: sudo xcode-select -s /Applications/Xcode_26.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        if: env.SIGN_IDENTITY != '' && env.IS_RELEASE_EVENT == 'true'
        env:
          CERT_P12_B64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

          echo "$CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build Mindle.app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify bundle
        run: |
          test -f build/Mindle.app/Contents/MacOS/mindle
          test -f build/Mindle.app/Contents/Resources/web/reader.html
          test -f build/Mindle.app/Contents/Info.plist
          echo "Bundle verified."

      - name: Codesign with hardened runtime
        if: env.SIGN_IDENTITY != '' && env.IS_RELEASE_EVENT == 'true'
        run: |
          set -euo pipefail

          # Sign embedded Sparkle.framework inside-out before signing
          # the outer app bundle. Notarization requires every nested
          # executable (XPC services, Autoupdate helper, Updater.app,
          # the framework itself) to carry a Developer ID signature.
          FRAMEWORK="build/Mindle.app/Contents/Frameworks/Sparkle.framework"
          SIGN_OPTS=(--force --options runtime --timestamp --sign "$SIGN_IDENTITY")

          for xpc in "$FRAMEWORK"/Versions/B/XPCServices/*.xpc; do
            [ -e "$xpc" ] || continue
            /usr/bin/codesign "${SIGN_OPTS[@]}" "$xpc"
          done
          /usr/bin/codesign "${SIGN_OPTS[@]}" "$FRAMEWORK/Versions/B/Autoupdate"
          /usr/bin/codesign "${SIGN_OPTS[@]}" "$FRAMEWORK/Versions/B/Updater.app"
          /usr/bin/codesign "${SIGN_OPTS[@]}" "$FRAMEWORK"

          # Quick Look extension carries its own sandbox entitlements;
          # sign it inside-out before the parent app so the parent's
          # signature seals over a notarization-ready extension.
          EXT="build/Mindle.app/Contents/PlugIns/MindleQuickLook.appex"
          if [ -e "$EXT" ]; then
            /usr/bin/codesign --force --options runtime --timestamp \
              --entitlements Resources/MindleQuickLook.entitlements \
              --sign "$SIGN_IDENTITY" \
              "$EXT"
          fi

          /usr/bin/codesign --force --options runtime --timestamp \
            --entitlements Entitlements.plist \
            --sign "$SIGN_IDENTITY" \
            build/Mindle.app
          /usr/bin/codesign --verify --strict --verbose=2 build/Mindle.app

      - name: Create DMG
        if: env.SIGN_IDENTITY != '' && env.IS_RELEASE_EVENT == 'true'
        run: |
          set -euo pipefail
          brew install create-dmg
          mkdir -p build/dmg-source
          cp -R build/Mindle.app build/dmg-source/
          create-dmg \
            --volname "Mindle" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Mindle.app" 175 180 \
            --hide-extension "Mindle.app" \
            --app-drop-link 425 180 \
            --no-internet-enable \
            build/Mindle.dmg \
            build/dmg-source/
          /usr/bin/codesign --force --sign "$SIGN_IDENTITY" --timestamp build/Mindle.dmg

      - name: Notarize, staple, and verify Gatekeeper
        if: env.SIGN_IDENTITY != '' && env.IS_RELEASE_EVENT == 'true'
        timeout-minutes: 75
        env:
          NOTARY_KEY_P8_B64: ${{ secrets.MACOS_NOTARY_API_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$NOTARY_KEY_P8_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

          # Capture notarytool's exit code separately so we can surface
          # Apple-side state even when notarytool itself times out
          # (exit 124) or otherwise returns non-zero.
          set +e
          SUBMISSION_JSON=$(xcrun notarytool submit build/Mindle.dmg \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait --timeout 60m \
            --output-format json)
          NOTARY_EXIT=$?
          set -e

          echo "$SUBMISSION_JSON"

          SUBMISSION_ID=$(echo "$SUBMISSION_JSON" | /usr/bin/python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))' 2>/dev/null || echo "")
          STATUS=$(echo "$SUBMISSION_JSON" | /usr/bin/python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))' 2>/dev/null || echo "")

          dump_apple_state() {
            if [ -z "$SUBMISSION_ID" ]; then return; fi
            echo "---- notarytool info ----"
            xcrun notarytool info "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" || true
            echo "---- notarytool log ----"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" || true
          }

          if [ $NOTARY_EXIT -ne 0 ]; then
            echo "::error::notarytool exited $NOTARY_EXIT (0 = success). Fetching Apple-side state..."
            dump_apple_state
            rm -f "$RUNNER_TEMP/AuthKey.p8"
            exit 1
          fi

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization status was '$STATUS' (expected 'Accepted')."
            dump_apple_state
            rm -f "$RUNNER_TEMP/AuthKey.p8"
            exit 1
          fi

          xcrun stapler staple build/Mindle.dmg
          xcrun stapler validate build/Mindle.dmg

          # Gatekeeper sanity check — the DMG must be accepted offline.
          spctl --assess --type open --context context:primary-signature -v build/Mindle.dmg

          rm "$RUNNER_TEMP/AuthKey.p8"

      - name: Sign DMG for Sparkle and update appcast
        if: env.SIGN_IDENTITY != '' && startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::warning::SPARKLE_ED_PRIVATE_KEY not set; skipping appcast update."
            exit 0
          fi

          # Fetch just the Sparkle CLI tools (not the framework — we
          # already have that bundled in the repo at Frameworks/).
          curl -fsSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          SIGN="$RUNNER_TEMP/sparkle/bin/sign_update"

          # Produce the EdDSA signature + length for the DMG.
          SIG_OUTPUT=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN" --ed-key-file - build/Mindle.dmg)
          echo "$SIG_OUTPUT"

          ED_SIG=$(echo "$SIG_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LEN=$(echo "$SIG_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIG" ] || [ -z "$LEN" ]; then
            echo "::error::failed to parse sign_update output"; exit 1
          fi

          TAG_NAME="${GITHUB_REF##*/}"
          VERSION="${TAG_NAME#v}"
          # Use the explicit triggering commit so this count is the SAME
          # as the one build.sh baked into the DMG's Info.plist, no
          # matter how HEAD drifts across steps.
          BUILD_NUMBER=$(git rev-list --count "$GITHUB_SHA")

          # Work from latest main so the appcast push is a fast-forward.
          git fetch origin main
          git checkout -B main origin/main

          /usr/bin/python3 scripts/update-appcast.py \
            "$VERSION" "$BUILD_NUMBER" "$ED_SIG" "$LEN"

          if git diff --quiet docs/appcast.xml; then
            echo "appcast unchanged; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast for $TAG_NAME (signed DMG entry)"
          git push origin main

      - name: Package zip (fallback)
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent Mindle.app Mindle.app.zip
          ls -lh Mindle.app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindle-${{ github.sha }}
          path: |
            build/Mindle.app.zip
            build/Mindle.dmg
          if-no-files-found: ignore

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          TAG="${GITHUB_REF##*/}"
          NOTES_FILE="docs/releases/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "hand_written=true" >> "$GITHUB_OUTPUT"
            echo "body_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "Using hand-written release notes from $NOTES_FILE"
          else
            echo "hand_written=false" >> "$GITHUB_OUTPUT"
            echo "body_path=" >> "$GITHUB_OUTPUT"
            echo "No $NOTES_FILE found; falling back to auto-generated notes."
          fi

      - name: Create GitHub Release (signed DMG)
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGN_IDENTITY != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/Mindle.dmg
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.hand_written != 'true' }}
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (unsigned zip fallback)
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGN_IDENTITY == ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/Mindle.app.zip
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.hand_written != 'true' }}
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keychain
        if: always() && env.KEYCHAIN != ''
        run: security delete-keychain "$KEYCHAIN" 2>/dev/null || true
